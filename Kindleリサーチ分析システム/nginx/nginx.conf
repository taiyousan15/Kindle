upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/m;

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # Health check (no redirect)
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    include /etc/nginx/conf.d/proxy-common.conf;
}

